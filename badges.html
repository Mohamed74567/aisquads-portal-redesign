<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Squads | Badges</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .sidebar-link:hover { background-color: rgba(99, 102, 241, 0.1); color: #6366f1; }
        .active-link { background-color: #6366f1; color: white !important; }
        .badge-card:hover .badge-icon { transform: scale(1.1) rotate(5deg); }
    </style>
</head>
<body class="flex min-h-screen">
    <aside class="w-64 bg-white border-r flex flex-col fixed h-full">
        <div class="p-6"><h1 class="text-2xl font-bold text-indigo-600 flex items-center"><i class="fas fa-brain mr-2"></i> AI SQUADS</h1></div>
        <nav class="flex-1 px-4 space-y-2 mt-4">
            <a href="index.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium"><i class="fas fa-th-large mr-3"></i> Dashboard</a>
            <a href="cohort.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium"><i class="fas fa-calendar-alt mr-3"></i> My Cohort</a>
            <a href="bounties.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium"><i class="fas fa-tasks mr-3"></i> Bounties</a>
            <a href="badges.html" class="sidebar-link active-link flex items-center p-3 rounded-xl transition-all font-medium"><i class="fas fa-award mr-3"></i> Badges</a>
            <a href="squads.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium"><i class="fas fa-users mr-3"></i> Squad Directory</a>
            <a href="leaderboard.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium"><i class="fas fa-chart-line mr-3"></i> Leaderboard</a>
        </nav>
    </aside>

    <main class="flex-1 ml-64 p-8">
        <header class="mb-8 flex justify-between items-center">
            <div><h2 class="text-2xl font-bold text-gray-800">My Achievements</h2><p class="text-gray-500">Collect badges by participating and helping others.</p></div>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6">
            <div class="badge-card bg-white p-6 rounded-2xl border shadow-sm text-center">
                <div class="badge-icon w-20 h-20 bg-yellow-50 rounded-full flex items-center justify-center text-yellow-600 text-3xl mx-auto mb-4 border-2 border-yellow-100 shadow-inner transition-all duration-300"><i class="fas fa-crown"></i></div>
                <h4 class="font-bold text-gray-800 text-sm">Early Bird</h4>
                <p class="text-[10px] text-gray-400 mt-1">Joined in the first 24h</p>
            </div>
            <div class="badge-card bg-white p-6 rounded-2xl border shadow-sm text-center">
                <div class="badge-icon w-20 h-20 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 text-3xl mx-auto mb-4 border-2 border-blue-100 shadow-inner transition-all duration-300"><i class="fas fa-code"></i></div>
                <h4 class="font-bold text-gray-800 text-sm">Code Ninja</h4>
                <p class="text-[10px] text-gray-400 mt-1">Solved 5 coding bounties</p>
            </div>
            <div class="badge-card bg-white p-6 rounded-2xl border shadow-sm text-center">
                <div class="badge-icon w-20 h-20 bg-green-50 rounded-full flex items-center justify-center text-green-600 text-3xl mx-auto mb-4 border-2 border-green-100 shadow-inner transition-all duration-300"><i class="fas fa-hands-helping"></i></div>
                <h4 class="font-bold text-gray-800 text-sm">Helper</h4>
                <p class="text-[10px] text-gray-400 mt-1">Answered 10 community Qs</p>
            </div>
        </div>
    </main>
</body>
</html>
