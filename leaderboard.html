<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Squads | Leaderboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
.sidebar-link:hover { background-color: rgba(99, 102, 241, 0.1); color: #6366f1; }
.active-link { background-color: #6366f1; color: white !important; }</style>
</head>
<body class="flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-white border-r flex flex-col fixed h-full shadow-md">
    <div class="p-6">
      <h1 class="text-2xl font-bold text-indigo-600 flex items-center">
        <i class="fas fa-brain mr-2"></i> AI SQUADS
      </h1>
    </div>
    <nav class="flex-1 px-4 space-y-2 mt-4">
      <a href="index.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium">
        <i class="fas fa-th-large mr-3"></i> Dashboard
      </a>
      <a href="cohort.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium">
        <i class="fas fa-calendar-alt mr-3"></i> My Cohort
      </a>
      <a href="bounties.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium">
        <i class="fas fa-tasks mr-3"></i> Bounties
      </a>
      <a href="badges.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium">
        <i class="fas fa-award mr-3"></i> Badges
      </a>
      <a href="squads.html" class="sidebar-link flex items-center p-3 rounded-xl transition-all text-gray-500 font-medium">
        <i class="fas fa-users mr-3"></i> Squad Directory
      </a>
      <a href="leaderboard.html" class="sidebar-link active-link flex items-center p-3 rounded-xl transition-all font-medium">
        <i class="fas fa-chart-line mr-3"></i> Leaderboard
      </a>
    </nav>
  </aside>
  <!-- Main Content -->
  <main class="ml-64 p-8 w-full">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">🏆 Leaderboard</h2>
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm text-left">
        <thead class="bg-indigo-50 text-indigo-700 font-semibold">
          <tr>
            <th class="p-4">Rank</th>
            <th class="p-4">Student</th>
            <th class="p-4">Squad</th>
            <th class="p-4">XP</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100 text-gray-700">
          <tr class="hover:bg-gray-50">
            <td class="p-4">🥇 1</td>
            <td class="p-4">Sarah K.</td>
            <td class="p-4">Titan Squad</td>
            <td class="p-4">3,200 XP</td>
          </tr>
          <tr class="hover:bg-gray-50">
            <td class="p-4">🥈 2</td>
            <td class="p-4">Ahmed R.</td>
            <td class="p-4">Phoenix</td>
            <td class="p-4">2,950 XP</td>
          </tr>
          <tr class="hover:bg-gray-50">
            <td class="p-4">🥉 3</td>
            <td class="p-4">Lina M.</td>
            <td class="p-4">Nova</td>
            <td class="p-4">2,700 XP</td>
          </tr>
          <tr class="bg-indigo-50 font-semibold">
            <td class="p-4">#42</td>
            <td class="p-4">Mohamed ⭐</td>
            <td class="p-4">Titan Squad</td>
            <td class="p-4">1,250 XP</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
